  - name: "Vajra"
    description: "A lightweight SSRF reconnaissance and validation toolkit that automates subdomain enumeration, endpoint discovery, parameter extraction, payload injection, and concurrent request execution to streamline Server-Side Request Forgery testing."
    bullet_points:
